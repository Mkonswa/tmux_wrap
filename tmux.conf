# tmux-wrapper config
# Source this file from ~/.tmux.conf

if-shell '[ -z "${TMUX_WRAPPER_HOME}" ]' 'set-environment -g TMUX_WRAPPER_HOME "${XDG_CONFIG_HOME:-$HOME/.config}/tmux-wrapper"'

set -g mouse on
set -g default-command "${SHELL}"
set -g xterm-keys on
set -sg escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g detach-on-destroy off

set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ",xterm-256color:Tc"
set-option -g allow-rename off

# Pane and window UX
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=#89b4fa,bold],#[fg=#585b70]} #P | #{?pane_title,#T,#W} "
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -n M-n new-window -c "#{pane_current_path}"

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind z resize-pane -Z
bind Tab last-window

# Theme
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 50
set -g status-right-length 80
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#585b70]| #[fg=#a6adc8]#W "
set -g status-right "#[fg=#585b70]| #[fg=#a6e3a1]#h #[fg=#585b70]| #[fg=#f9e2af]%a %d %b #[fg=#585b70]| #[fg=#89b4fa,bold]%H:%M "

setw -g window-status-style "fg=#6c7086,bg=#1e1e2e"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-current-format " #I:#W "
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#45475a,fg=#cdd6f4"

# Copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || true"

# Keep editor integration vars when attaching from VS Code/Cursor terminals
set -g update-environment "VSCODE_GIT_ASKPASS_NODE VSCODE_GIT_ASKPASS_EXTRA_ARGS VSCODE_GIT_ASKPASS_MAIN VSCODE_GIT_IPC_HANDLE VSCODE_IPC_HOOK_CLI PATH DISPLAY"

# Renaming shortcuts
bind '$' command-prompt -I "#S" -p "Session name:" "rename-session '%%'"
bind , command-prompt -I "#W" -p "Window name:" "rename-window '%%'"
bind P command-prompt -I "#T" -p "Pane title:" "select-pane -T '%%'"

# Wrapper scripts
bind C command-prompt -p "New session:" "new-session -s '%%'"
bind C-f run-shell -b "#{TMUX_WRAPPER_HOME}/scripts/session-switcher.sh"
bind D run-shell "#{TMUX_WRAPPER_HOME}/scripts/dashboard.sh"
bind ? display-popup -E -w 72 -h 24 "#{TMUX_WRAPPER_HOME}/scripts/help-popup.sh"

bind s choose-tree -Z
bind-key -T tree-mode S command-prompt -I "#{session_name}" -p "Rename session:" "run-shell 'tmux rename-session -t \"#{session_name}\" \"%%\"'"
bind-key -T tree-mode W command-prompt -I "#{window_name}" -p "Rename window:" "run-shell 'tmux rename-window -t \"#{window_id}\" \"%%\"'"
bind-key -T tree-mode P command-prompt -I "#{pane_title}" -p "Rename pane:" "run-shell 'tmux select-pane -t \"#{pane_id}\" -T \"%%\"'"

bind r source-file ~/.tmux.conf \; display-message -d 2000 "Config reloaded"
